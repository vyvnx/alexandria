name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # turbo --affected needs git history to diff against the base

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Python workspace
        run: uv sync --all-packages

      - name: Install JS workspace (turbo)
        run: pnpm install --frozen-lockfile

      # Affected-only: turbo diffs against the base branch and runs tasks ONLY for
      # packages whose inputs changed (plus their dependents) — the big-repo pattern
      # of "build/test just what changed". On main pushes it tests everything.
      - name: Lint + test (affected)
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.base_ref || 'HEAD^1' }}
        run: pnpm exec turbo run lint test --affected

  # Build + push one container image per deployable app. Gate each on path changes so
  # only the apps that actually changed get rebuilt/redeployed.
  images:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [api, engine]
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes to ${{ matrix.app }}
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/core/**'
              - 'uv.lock'

      - name: Set up Buildx
        if: steps.changed.outputs.app == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image
        if: steps.changed.outputs.app == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false # set true + add registry login/tags to deploy
          tags: alexandria-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
