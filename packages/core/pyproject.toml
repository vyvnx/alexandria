[project]
name = "alexandria-core"
version = "0.1.0"
description = "Alexandria shared domain: graph store, ingest pipeline, provider interfaces"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.3",
  "trafilatura>=1.12",
  "sqlite-vec>=0.1.6",
  "rapidfuzz>=3.9",
  "pymupdf>=1.28.0",
]

[project.optional-dependencies]
# headless browser for opt-in visual enrichment. install with:
#   uv sync --extra visual  &&  playwright install chromium
visual = ["playwright>=1.40"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alexandria_core"]
